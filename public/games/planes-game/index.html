<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>لعبة الطيارات - عالم الفهود</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background: #ace;
            box-shadow: 0 0 50px rgba(0000.5);
            border: 5px solid #fff;
            cursor: crosshair;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0000.5);
        }
    </style>
</head>
<body>
    <div class="ui">النقاط: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        let score = 0;
        let gameActive = true;

        const player = {
            x: 50
            y: 300
            w: 60
            h: 30
            speed: 5
        };

        const obstacles = [];
        const clouds = [];

        function createObstacle() {
            obstacles.push({
                x: canvas.width
                y: Math.random() * (canvas.height - 50)
                w: 40
                h: 40
                speed: 3 + Math.random() * 3
            });
        }

        function createCloud() {
            clouds.push({
                x: canvas.width
                y: Math.random() * canvas.height
                w: 100 + Math.random() * 50
                h: 40
                speed: 1
            });
        }

        const keys = {};
        window.addEventListener('keydown' e => keys[e.code] = true);
        window.addEventListener('keyup' e => keys[e.code] = false);

        function update() {
            if (!gameActive) return;

            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;

            if (Math.random() < 0.02) createObstacle();
            if (Math.random() < 0.01) createCloud();

            clouds.forEach((c i) => {
                c.x -= c.speed;
                if (c.x + c.w < 0) clouds.splice(i 1);
            });

            obstacles.forEach((o i) => {
                o.x -= o.speed;
                if (o.x + o.w < 0) {
                    obstacles.splice(i 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                }

                // Collision
                if (player.x < o.x + o.w &&
                    player.x + player.w > o.x &&
                    player.y < o.y + o.h &&
                    player.y + player.h > o.y) {
                    gameActive = false;
                    alert('انتهت اللعبة! نقاطك: ' + score);
                    location.reload();
                }
            });
        }

        function draw() {
            ctx.clearRect(0 0 canvas.width canvas.height);

            // Draw Clouds
            ctx.fillStyle = 'rgba(255 255 255 0.7)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x c.y 20 0 Math.PI * 2);
                ctx.arc(c.x + 30 c.y - 10 25 0 Math.PI * 2);
                ctx.arc(c.x + 60 c.y 20 0 Math.PI * 2);
                ctx.fill();
            });

            // Draw Player (Scout Plane)
            ctx.fillStyle = '#632E83'; // Scouting Purple
            ctx.fillRect(player.x player.y player.w player.h);
            ctx.fillStyle = '#FFD700'; // Gold
            ctx.fillRect(player.x + 40 player.y + 5 25 20); // Window

            // Draw Obstacles (Birds/Rocks)
            ctx.fillStyle = '#444';
            obstacles.forEach(o => {
                ctx.fillRect(o.x o.y o.w o.h);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
